name: Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write  # Required for npm OIDC trusted publishing
  contents: write  # Required for pushing git tags
  pull-requests: write  # Required for changesets to create PRs

jobs:
  release:
    name: Release
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [24]
    timeout-minutes: 5

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      # Trusted publishing requires npm 11.5.1+ (Node 24 + explicit upgrade).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
        shell: bash

      - name: Publish to NPM
        uses: changesets/action@v1.4.0
        with:
          publish: pnpm changeset:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty string so changesets/action uses OIDC instead of a classic token.
          # Trusted publisher must be configured for main.yml on npm.
          NPM_TOKEN: ''
